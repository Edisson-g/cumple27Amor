<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>🎂 Feliz Cumpleaños</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #1a0a2e;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }

    .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .star {
      position:absolute; background:white; border-radius:50%;
      animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
    }
    @keyframes twinkle {
      0%,100%{opacity:0.15;transform:scale(1);}
      50%{opacity:1;transform:scale(1.4);}
    }

    .container {
      position:relative; z-index:1;
      display:flex; flex-direction:column;
      align-items:center; gap:18px;
      padding:24px 16px; width:100%; max-width:400px;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.7rem, 7vw, 2.3rem);
      color: #ff6fb7;
      text-shadow: 0 0 20px rgba(255,111,183,0.8), 0 0 40px rgba(255,111,183,0.4);
      text-align:center;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{text-shadow:0 0 20px rgba(255,111,183,0.8),0 0 40px rgba(255,111,183,0.4);}
      50%{text-shadow:0 0 30px rgba(255,111,183,1),0 0 60px rgba(255,111,183,0.7);}
    }

    #cake-canvas {
      width: 100%; max-width: 340px;
      aspect-ratio: 1/1;
      border-radius: 20px;
      border: 1px solid rgba(255,111,183,0.25);
      box-shadow: 0 0 40px rgba(255,111,183,0.2), 0 20px 60px rgba(0,0,0,0.5);
      background: #0d0520;
      display: block;
    }

    #light-btn {
      width:100%; padding:15px; border-radius:14px; border:none;
      cursor:pointer; font-family:'Nunito',sans-serif;
      font-size:1.05rem; font-weight:700;
      background: linear-gradient(135deg,#ff6fb7,#c44dff);
      color:white; box-shadow:0 8px 30px rgba(255,111,183,0.4);
      transition: all 0.3s; position:relative; overflow:hidden;
    }
    #light-btn:hover { transform:translateY(-2px); }
    #light-btn:active { transform:scale(0.97); }
    #light-btn:disabled { opacity:0.55; cursor:not-allowed; }
    #light-btn.lit {
      background: linear-gradient(135deg,#ffd166,#ff9a3c);
      animation: glow-btn 2s ease-in-out infinite;
    }
    @keyframes glow-btn {
      0%,100%{box-shadow:0 8px 30px rgba(255,166,0,0.5);}
      50%{box-shadow:0 8px 30px rgba(255,166,0,0.8),0 0 60px rgba(255,200,50,0.3);}
    }

    .ripple {
      position:absolute; border-radius:50%;
      background:rgba(255,255,255,0.35); transform:scale(0);
      animation:rip 0.6s linear; pointer-events:none;
    }
    @keyframes rip { to{transform:scale(4);opacity:0;} }

    .confetti-piece {
      position:fixed; top:-20px; pointer-events:none; z-index:999;
      animation: cfall var(--d,3s) ease-in var(--dl,0s) forwards;
      border-radius:var(--r,2px);
    }
    @keyframes cfall {
      0%{transform:translateY(0) rotate(0);opacity:1;}
      100%{transform:translateY(110vh) rotate(720deg) translateX(var(--dx,0px));opacity:0;}
    }

    #popup-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(10,0,20,0.8); z-index:1000;
      align-items:center; justify-content:center; cursor:pointer;
    }
    #popup-overlay.show { display:flex; animation:fi 0.4s ease; }
    @keyframes fi{from{opacity:0;}to{opacity:1;}}
    .popup-card {
      background:linear-gradient(145deg,#2d0a4e,#1a0a2e);
      border:1px solid rgba(255,111,183,0.4);
      border-radius:22px; padding:36px 28px;
      max-width:290px; width:88%; text-align:center;
      box-shadow:0 0 60px rgba(255,111,183,0.25);
      animation:pu 0.45s cubic-bezier(0.34,1.56,0.64,1); cursor:default;
    }
    @keyframes pu{from{transform:scale(0.65);opacity:0;}to{transform:scale(1);opacity:1;}}
    .popup-emoji{font-size:2.5rem;margin-bottom:12px;}
    .popup-text{font-size:1rem;line-height:1.75;color:#fff0f8;margin-bottom:20px;}
    .popup-hint{font-size:0.7rem;color:rgba(255,255,255,0.28);letter-spacing:1px;text-transform:uppercase;}
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <h1>¡Feliz Cumpleaños! 🎉</h1>
  <canvas id="cake-canvas"></canvas>
  <button id="light-btn" onclick="handleLight(event)">🕯️ ¡Encender la vela!</button>
</div>

<div id="popup-overlay" onclick="closePopup()">
  <div class="popup-card" onclick="event.stopPropagation()">
    <div class="popup-emoji">💖</div>
    <p class="popup-text">Hace tantos años te conocí y ahora estamos viviendo esto juntos.</p>
    <p class="popup-hint" onclick="closePopup()" style="cursor:pointer;">toca para cerrar</p>
  </div>
</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`;
  starsEl.appendChild(s);
}

// Canvas setup
const canvas = document.getElementById('cake-canvas');
const ctx = canvas.getContext('2d');

function resize(){
  const size = Math.min(canvas.parentElement.clientWidth, 340);
  canvas.width = size;
  canvas.height = size;
}
resize();
window.addEventListener('resize', resize);

// State
let lit = false;
let flameTime = 0;
let flickerOffset = [Math.random()*10, Math.random()*10];

// ── DRAW FUNCTIONS ──

function drawBackground(){
  const grad = ctx.createRadialGradient(canvas.width/2, canvas.height, 10, canvas.width/2, canvas.height/2, canvas.height);
  grad.addColorStop(0,'#2d0a4e');
  grad.addColorStop(1,'#0d0520');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawTable(cx, tableY){
  // Table surface
  ctx.fillStyle = '#3d1a6b';
  ctx.beginPath();
  ctx.ellipse(cx, tableY+10, canvas.width*0.48, 18, 0, 0, Math.PI*2);
  ctx.fill();
  // Shadow under cake
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(cx, tableY+6, canvas.width*0.38, 12, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawCakeTier(cx, y, w, h, color, frostColor){
  const rx = w/2;
  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(cx, y, rx, rx*0.22, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillRect(cx-rx, y, rx*2, h);
  ctx.beginPath();
  ctx.ellipse(cx, y+h, rx, rx*0.22, 0, 0, Math.PI*2);
  ctx.fill();

  // Frosting drip on top
  ctx.fillStyle = frostColor;
  ctx.beginPath();
  ctx.ellipse(cx, y, rx, rx*0.22, 0, 0, Math.PI*2);
  ctx.fill();

  // Side frosting drips
  const drips = 7;
  for(let i=0;i<drips;i++){
    const dx = cx - rx + (i+0.5)*(rx*2/drips);
    const dh = 10 + Math.sin(i*1.7)*6;
    ctx.fillStyle = frostColor;
    ctx.beginPath();
    ctx.ellipse(dx, y+dh, 8, 5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(dx-8, y, 16, dh);
  }
}

function drawDecorations(cx, y, r){
  const colors = ['#ffd166','#06d6a0','#ff6fb7','#c44dff','#ff9a3c'];
  const count = 10;
  for(let i=0;i<count;i++){
    const a = (i/count)*Math.PI*2;
    const bx = cx + Math.cos(a)*r;
    const by = y + Math.sin(a)*(r*0.18);
    ctx.fillStyle = colors[i%colors.length];
    ctx.beginPath();
    ctx.arc(bx, by, 5, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawSprinkles(cx, topY, r){
  const colors = ['#ffd166','#06d6a0','#ff6fb7','#c44dff'];
  for(let i=0;i<16;i++){
    const a = Math.random()*Math.PI*2;
    const dist = Math.random()*r*0.8;
    const sx = cx + Math.cos(a)*dist;
    const sy = topY - 4 + Math.sin(a)*dist*0.2;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(Math.random()*Math.PI);
    ctx.fillStyle = colors[i%colors.length];
    ctx.fillRect(-5, -2, 10, 4);
    ctx.restore();
  }
}

function drawNumberCandle(cx, topY, number, color, index){
  const cw = 28, ch = 80;
  const x = cx - cw/2;
  const y = topY - ch;

  // Candle shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(cx, topY, cw/2, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // Candle body gradient
  const bodyGrad = ctx.createLinearGradient(x, y, x+cw, y);
  bodyGrad.addColorStop(0, shadeColor(color, -30));
  bodyGrad.addColorStop(0.3, color);
  bodyGrad.addColorStop(0.7, lightenColor(color, 30));
  bodyGrad.addColorStop(1, shadeColor(color, -20));

  // Rounded rect candle
  ctx.fillStyle = bodyGrad;
  roundRect(ctx, x, y, cw, ch, 6);
  ctx.fill();

  // Wax drip highlight
  ctx.fillStyle = lightenColor(color, 50);
  ctx.beginPath();
  ctx.ellipse(cx, y, cw/2, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // White band in middle
  const bandY = y + ch*0.35;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  roundRect(ctx, x, bandY, cw, ch*0.3, 3);
  ctx.fill();

  // Number on white band
  ctx.save();
  ctx.font = `bold ${ch*0.28}px 'Pacifico', cursive`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  ctx.fillText(number, cx, bandY + ch*0.15);
  ctx.restore();

  // Wick
  ctx.strokeStyle = '#1a0a00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, y);
  ctx.lineTo(cx, y - 12);
  ctx.stroke();

  return { wx: cx, wy: y - 12 }; // wick tip
}

function drawFlame(wx, wy, t, off){
  const flicker = 1 + 0.2*Math.sin(t*8+off) + 0.1*Math.sin(t*14+off);
  const sway = 3*Math.sin(t*5+off);
  const fw = 14*flicker, fh = 34*flicker;

  // Glow
  const glow = ctx.createRadialGradient(wx+sway*0.4, wy-fh*0.3, 2, wx, wy, fw*2.5);
  glow.addColorStop(0,'rgba(255,200,50,0.5)');
  glow.addColorStop(0.4,'rgba(255,100,0,0.2)');
  glow.addColorStop(1,'rgba(255,50,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.ellipse(wx+sway*0.4, wy-fh*0.3, fw*2.5, fh*1.6, 0, 0, Math.PI*2);
  ctx.fill();

  // Outer flame
  ctx.beginPath();
  ctx.moveTo(wx, wy);
  ctx.bezierCurveTo(wx-fw, wy-fh*0.4, wx-fw*0.5+sway, wy-fh, wx+sway*0.5, wy-fh);
  ctx.bezierCurveTo(wx+fw*0.5+sway, wy-fh, wx+fw, wy-fh*0.4, wx, wy);
  const og = ctx.createLinearGradient(wx, wy, wx+sway*0.5, wy-fh);
  og.addColorStop(0,'#ff3300'); og.addColorStop(0.45,'#ff7700');
  og.addColorStop(0.85,'#ffcc00'); og.addColorStop(1,'#ffff99');
  ctx.fillStyle = og; ctx.fill();

  // Inner core
  ctx.beginPath();
  ctx.moveTo(wx, wy-3);
  ctx.bezierCurveTo(wx-fw*0.35,wy-fh*0.45, wx-fw*0.15+sway*0.5,wy-fh*0.88, wx+sway*0.3,wy-fh*0.88);
  ctx.bezierCurveTo(wx+fw*0.15+sway*0.5,wy-fh*0.88, wx+fw*0.35,wy-fh*0.45, wx,wy-3);
  const ig = ctx.createLinearGradient(wx, wy-3, wx+sway*0.3, wy-fh*0.88);
  ig.addColorStop(0,'#ffbb00'); ig.addColorStop(1,'#ffffff');
  ctx.fillStyle = ig; ctx.fill();
}

function drawAmbientGlow(cx, cy){
  // Warm light spreading from candles when lit
  const glow = ctx.createRadialGradient(cx, cy, 10, cx, cy, canvas.width*0.6);
  const alpha = 0.12 + 0.04*Math.sin(flameTime*3);
  glow.addColorStop(0,`rgba(255,160,50,${alpha})`);
  glow.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// Helpers
function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function shadeColor(hex, amt){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,Math.max(0,((n>>16)&0xff)+amt));
  const g=Math.min(255,Math.max(0,((n>>8)&0xff)+amt));
  const b=Math.min(255,Math.max(0,(n&0xff)+amt));
  return `rgb(${r},${g},${b})`;
}
function lightenColor(hex, amt){ return shadeColor(hex, amt); }

// ── MAIN DRAW LOOP ──
let sprinkleData = [];
function initSprinkles(cx, topY, r){
  sprinkleData = [];
  for(let i=0;i<18;i++){
    const a = Math.random()*Math.PI*2;
    const dist = Math.random()*r*0.78;
    sprinkleData.push({
      x: cx+Math.cos(a)*dist,
      y: topY-4+Math.sin(a)*dist*0.18,
      rot: Math.random()*Math.PI,
      color: ['#ffd166','#06d6a0','#ff6fb7','#c44dff'][i%4]
    });
  }
}

function draw(){
  const W = canvas.width, H = canvas.height;
  const cx = W/2;

  drawBackground();

  // Layout
  const tableY   = H * 0.82;
  const bot_y    = H * 0.45;  // top of bottom tier
  const bot_h    = H * 0.26;
  const bot_w    = W * 0.72;
  const top_y    = bot_y - H*0.02;
  const top_h    = H * 0.22;
  const top_w    = W * 0.46;
  const cakeTopY = top_y - H*0.01; // surface of top tier

  // Init sprinkles once
  if(sprinkleData.length===0) initSprinkles(cx, cakeTopY, top_w/2);

  // Warm glow overlay when lit
  if(lit) drawAmbientGlow(cx, cakeTopY - top_h*0.3);

  drawTable(cx, tableY);
  drawCakeTier(cx, bot_y, bot_w, bot_h, '#ff6fb7', '#ffeef8');
  drawDecorations(cx, bot_y+bot_h*0.5, bot_w*0.48);
  drawCakeTier(cx, top_y, top_w, top_h, '#c44dff', '#f0e0ff');

  // Sprinkles on top tier surface
  sprinkleData.forEach(sp=>{
    ctx.save(); ctx.translate(sp.x, sp.y); ctx.rotate(sp.rot);
    ctx.fillStyle = sp.color;
    ctx.fillRect(-6,-2,12,4);
    ctx.restore();
  });

  // Two candles — "2" and "7" — side by side on top tier
  const gap = top_w * 0.28;
  const c2 = drawNumberCandle(cx - gap, cakeTopY, '2', '#ffd166', 0);
  const c7 = drawNumberCandle(cx + gap, cakeTopY, '7', '#ff6fb7', 1);

  // Flames
  if(lit){
    flameTime += 0.05;
    drawFlame(c2.wx, c2.wy, flameTime, flickerOffset[0]);
    drawFlame(c7.wx, c7.wy, flameTime, flickerOffset[1]);
  }

  requestAnimationFrame(draw);
}

draw();

// ── Interaction ──
const MI_MUSICA = 'song.mp3';
let isLit = false;

function handleLight(e){
  if(isLit) return;
  const btn = document.getElementById('light-btn');
  const rect = btn.getBoundingClientRect();
  const rip = document.createElement('span');
  rip.className = 'ripple';
  const sz = Math.max(rect.width, rect.height);
  rip.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  btn.appendChild(rip);
  setTimeout(()=>rip.remove(),600);
  isLit = true; lit = true;
  btn.classList.add('lit');
  btn.innerHTML = '🔥 ¡Vela encendida!';
  btn.disabled = true;
  new Audio(MI_MUSICA).play().catch(()=>{});
  setTimeout(showPopup, 1600);
  setTimeout(()=>{ launchConfetti(); setInterval(launchConfetti,1800); }, 400);
}

let confetti = 60;
function launchConfetti(){
  const clrs=['#ff6fb7','#ffd166','#06d6a0','#c44dff','#ff9a3c','#fff'];
  const shps=['2px','50%','0'];
  for(let i=0;i<confetti;i++){
    const c=document.createElement('div'); c.className='confetti-piece';
    const s=6+Math.random()*8;
    c.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s*(0.4+Math.random()*0.8)}px;background:${clrs[Math.floor(Math.random()*clrs.length)]};--d:${2+Math.random()*2.5}s;--dl:${Math.random()*1.5}s;--dx:${(Math.random()-0.5)*200}px;--r:${shps[Math.floor(Math.random()*shps.length)]};`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),(parseFloat(c.style.getPropertyValue('--d'))+parseFloat(c.style.getPropertyValue('--dl')))*1000+500);
  }
  if(confetti>1) confetti=Math.max(1,Math.floor(confetti*0.75));
  setTimeout(launchConfetti,20000);
}

function showPopup(){ document.getElementById('popup-overlay').classList.add('show'); }
function closePopup(){ document.getElementById('popup-overlay').classList.remove('show'); }
</script>
</body>
</html>
