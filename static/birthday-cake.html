<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🎂 Feliz Cumpleaños</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap');

    :root {
      --bg: #1a0a2e;
      --accent: #ff6fb7;
      --gold: #ffd166;
      --mint: #06d6a0;
      --text: #fff0f8;
      --glow: rgba(255, 111, 183, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 111, 183, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
      gap: 16px;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 7vw, 2.4rem);
      color: var(--accent);
      text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
      letter-spacing: 1px;
      text-align: center;
      animation: pulse-text 3s ease-in-out infinite;
    }

    @keyframes pulse-text {
      0%, 100% { text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow); }
      50% { text-shadow: 0 0 30px var(--glow), 0 0 60px var(--glow), 0 0 80px var(--glow); }
    }

    #canvas-wrapper {
      width: 100%;
      max-width: 340px;
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(255, 111, 183, 0.2),
        0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 111, 183, 0.2);
      background: radial-gradient(ellipse at center bottom, #2d0a4e 0%, #0d0520 100%);
    }

    #canvas-wrapper canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* Status hidden */
    #status { display: none; }



    /* Main button */
    #light-btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #ff6fb7, #c44dff);
      color: white;
      box-shadow: 0 8px 32px rgba(255, 111, 183, 0.4), 0 0 0 0 var(--glow);
    }

    #light-btn:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(255, 111, 183, 0.6);
    }

    #light-btn:not(:disabled):active {
      transform: translateY(0px) scale(0.97);
    }

    #light-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #light-btn.lit {
      background: linear-gradient(135deg, #ffd166, #ff9a3c);
      box-shadow: 0 8px 32px rgba(255, 166, 0, 0.5), 0 0 60px rgba(255, 200, 50, 0.2);
      animation: glow-btn 2s ease-in-out infinite;
    }

    @keyframes glow-btn {
      0%, 100% { box-shadow: 0 8px 32px rgba(255, 166, 0, 0.5), 0 0 40px rgba(255, 200, 50, 0.15); }
      50% { box-shadow: 0 8px 32px rgba(255, 166, 0, 0.7), 0 0 70px rgba(255, 200, 50, 0.35); }
    }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: ripple-anim 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -20px;
      animation: confetti-fall var(--duration, 3s) ease-in forwards;
      animation-delay: var(--delay, 0s);
      z-index: 999;
      pointer-events: none;
      border-radius: var(--radius, 2px);
    }

    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg) translateX(var(--drift, 0px)); opacity: 0; }
    }



    /* Popup */
    #popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 20, 0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: fade-in 0.5s ease;
    }
    #popup-overlay.visible {
      display: flex;
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .popup-card {
      background: linear-gradient(145deg, #2d0a4e, #1a0a2e);
      border: 1px solid rgba(255, 111, 183, 0.35);
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 300px;
      width: 88%;
      text-align: center;
      box-shadow: 0 0 60px rgba(255, 111, 183, 0.2), 0 20px 60px rgba(0,0,0,0.6);
      animation: pop-up 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: default;
    }
    @keyframes pop-up {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .popup-emoji {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .popup-text {
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: #fff0f8;
      margin: 0 0 20px;
    }
    .popup-hint {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <h1>¡Feliz Cumpleaños! 🎉</h1>

  <div id="canvas-wrapper"></div>

  <button id="light-btn" onclick="handleLightCandle(event)">
    🕯️ ¡Encender la vela!
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Stars background ───────────────────────────────────────────────
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${2+Math.random()*4}s;
    --delay:${Math.random()*5}s;
  `;
  starsContainer.appendChild(s);
}

// ─── Three.js Scene ──────────────────────────────────────────────────
const wrapper = document.getElementById('canvas-wrapper');
const W = wrapper.clientWidth, H = wrapper.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
wrapper.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
camera.position.set(0, 3.5, 8);
camera.lookAt(0, 0.5, 0);

// Ambient light
const ambient = new THREE.AmbientLight(0x2a1040, 1.5);
scene.add(ambient);

// Subtle directional light
const dirLight = new THREE.DirectionalLight(0xffc8e8, 0.5);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// ── Flame point light (initially off) ──
const flameLight = new THREE.PointLight(0xff9a20, 0, 4);
flameLight.position.set(0, 3.05, 0);
flameLight.castShadow = true;
scene.add(flameLight);

// ── TABLE ──
const tableGeo = new THREE.CylinderGeometry(4, 4, 0.2, 32);
const tableMat = new THREE.MeshStandardMaterial({ color: 0x3d1a6b, roughness: 0.6, metalness: 0.1 });
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.y = -0.7;
table.receiveShadow = true;
scene.add(table);

// ── CAKE base (bottom tier) ──
const cakeBot = new THREE.Mesh(
  new THREE.CylinderGeometry(1.5, 1.5, 0.9, 48),
  new THREE.MeshStandardMaterial({ color: 0xff6fb7, roughness: 0.5 })
);
cakeBot.position.y = -0.15;
cakeBot.castShadow = true;
cakeBot.receiveShadow = true;
scene.add(cakeBot);

// Frosting bottom rim
const frostBot = new THREE.Mesh(
  new THREE.TorusGeometry(1.5, 0.12, 16, 60),
  new THREE.MeshStandardMaterial({ color: 0xffeef8, roughness: 0.4 })
);
frostBot.position.y = 0.3;
scene.add(frostBot);

// ── CAKE top tier ──
const cakeTop = new THREE.Mesh(
  new THREE.CylinderGeometry(0.95, 0.95, 0.8, 48),
  new THREE.MeshStandardMaterial({ color: 0xc44dff, roughness: 0.5 })
);
cakeTop.position.y = 0.9;
cakeTop.castShadow = true;
scene.add(cakeTop);

// Frosting top rim
const frostTop = new THREE.Mesh(
  new THREE.TorusGeometry(0.95, 0.1, 16, 60),
  new THREE.MeshStandardMaterial({ color: 0xffeef8, roughness: 0.4 })
);
frostTop.position.y = 1.3;
scene.add(frostTop);

// Top flat frosting
const topFrost = new THREE.Mesh(
  new THREE.CylinderGeometry(0.95, 0.95, 0.05, 48),
  new THREE.MeshStandardMaterial({ color: 0xffeef8, roughness: 0.4 })
);
topFrost.position.y = 1.32;
scene.add(topFrost);

// ── DECORATIONS: small balls on bottom tier ──
const ballColors = [0xffd166, 0x06d6a0, 0xff6fb7, 0xc44dff, 0xff9a3c];
for (let i = 0; i < 10; i++) {
  const angle = (i / 10) * Math.PI * 2;
  const ball = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 16, 16),
    new THREE.MeshStandardMaterial({ color: ballColors[i % 5], roughness: 0.3, metalness: 0.3 })
  );
  ball.position.set(Math.cos(angle) * 1.5, 0.3, Math.sin(angle) * 1.5);
  scene.add(ball);
}

// Balls on top tier
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2;
  const ball = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 16, 16),
    new THREE.MeshStandardMaterial({ color: ballColors[(i + 2) % 5], roughness: 0.3, metalness: 0.3 })
  );
  ball.position.set(Math.cos(angle) * 0.95, 1.3, Math.sin(angle) * 0.95);
  scene.add(ball);
}

// ── CANDLE ──
const candleMat = new THREE.MeshStandardMaterial({ color: 0xfff0a0, roughness: 0.6 });
const candleBody = new THREE.Mesh(
  new THREE.CylinderGeometry(0.1, 0.1, 0.7, 20),
  candleMat
);
candleBody.position.y = 1.72;
scene.add(candleBody);

// Candle top (melted wax)
const candleTop = new THREE.Mesh(
  new THREE.CylinderGeometry(0.1, 0.1, 0.03, 20),
  new THREE.MeshStandardMaterial({ color: 0xfffacd, roughness: 0.7 })
);
candleTop.position.y = 2.07;
scene.add(candleTop);

// ── WICK ──
const wickGeo = new THREE.CylinderGeometry(0.008, 0.008, 0.18, 8);
const wickMat = new THREE.MeshStandardMaterial({ color: 0x1a0a00 });
const wick = new THREE.Mesh(wickGeo, wickMat);
wick.position.y = 2.16;
scene.add(wick);

// ── FLAME (hidden initially) ──
const flameGroup = new THREE.Group();
flameGroup.position.set(0, 2.29, 0);
flameGroup.visible = false;
scene.add(flameGroup);

// Outer flame
const flameGeo = new THREE.ConeGeometry(0.09, 0.32, 12, 1, true);
const flameMat = new THREE.MeshStandardMaterial({
  color: 0xff7700,
  emissive: 0xff5500,
  emissiveIntensity: 2,
  transparent: true,
  opacity: 0.92,
  side: THREE.DoubleSide,
  depthWrite: false
});
const flame = new THREE.Mesh(flameGeo, flameMat);
flameGroup.add(flame);

// Inner flame (brighter core)
const innerFlameMat = new THREE.MeshStandardMaterial({
  color: 0xffff80,
  emissive: 0xffee00,
  emissiveIntensity: 3,
  transparent: true,
  opacity: 0.85,
  side: THREE.DoubleSide,
  depthWrite: false
});
const innerFlame = new THREE.Mesh(
  new THREE.ConeGeometry(0.045, 0.2, 12, 1, true),
  innerFlameMat
);
innerFlame.position.y = -0.03;
flameGroup.add(innerFlame);

// ── SPRINKLES on top tier ──
const sprinkleColors = [0xffd166, 0x06d6a0, 0xff6fb7, 0xc44dff];
for (let i = 0; i < 18; i++) {
  const r = Math.random() * 0.75;
  const a = Math.random() * Math.PI * 2;
  const sprinkle = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02, 0.02, 0.1, 8),
    new THREE.MeshStandardMaterial({ color: sprinkleColors[i % 4], roughness: 0.4 })
  );
  sprinkle.position.set(Math.cos(a) * r, 1.36, Math.sin(a) * r);
  sprinkle.rotation.z = Math.random() * Math.PI;
  sprinkle.rotation.x = Math.random() * Math.PI;
  scene.add(sprinkle);
}

// ─── Animation State ─────────────────────────────────────────────────
let candleLit = false;
let flameLightTarget = 0;
let flameTime = 0;

function animate() {
  requestAnimationFrame(animate);

  // Smooth light intensity
  flameLight.intensity += (flameLightTarget - flameLight.intensity) * 0.05;

  if (candleLit && flameGroup.visible) {
    flameTime += 0.05;
    // Flicker flame
    const flicker = 1 + 0.15 * Math.sin(flameTime * 7.3) + 0.08 * Math.sin(flameTime * 13.1);
    flameGroup.scale.set(flicker * 0.9, flicker, flicker * 0.9);
    flameGroup.position.x = 0.01 * Math.sin(flameTime * 4.7);
    // Flicker light
    flameLight.intensity = (1.8 + 0.4 * Math.sin(flameTime * 9) + 0.2 * Math.sin(flameTime * 17)) * flameLightTarget;
    flameLight.color.setHSL(0.08 + 0.02 * Math.sin(flameTime * 3), 1, 0.6);
  }

  // Gentle cake rotation
  const group = [cakeBot, cakeTop, frostBot, frostTop, topFrost, candleBody, candleTop, wick, flameGroup];
  // Rotate whole scene slowly... via camera orbit
  const t = Date.now() * 0.0003;
  camera.position.x = Math.sin(t) * 0.8;
  camera.position.z = 8 + Math.cos(t) * 0.3;
  camera.lookAt(0, 0.8, 0);

  renderer.render(scene, camera);
}
animate();

// ─── Responsive resize ───────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = wrapper.clientWidth;
  const h = wrapper.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

// ─── Config — cambia esta URL por la tuya ────────────────────────────
const SERVER_URL = 'https://tu-servidor.com/api/endpoint';

// ─── Tu música — pon aquí la ruta a tu pista ─────────────────────────
// Ejemplo mismo folder:   'cancion.mp3'
// Ejemplo subcarpeta:     'musica/cancion.mp3'
const MI_MUSICA = 'song.mp3';

// ─── Light candle + silent GET request ──────────────────────────────
let isLit = false;

async function handleLightCandle(e) {
  if (isLit) return;

  const btn = document.getElementById('light-btn');

  // Ripple effect
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  // Silent GET — fire and forget, sin mostrar nada al usuario
  fetch(SERVER_URL, { method: 'GET', mode: 'cors' }).catch(() => {});

  // Light the candle immediately
  isLit = true;
  lightCandle();
  btn.classList.add('lit');
  btn.innerHTML = '🔥 ¡Vela encendida!';
  btn.disabled = true;
}

function lightCandle() {
  candleLit = true;
  flameGroup.visible = true;
  flameLightTarget = 1.8;
  flameLight.position.set(0, 2.4, 0);
  // Wick color change
  wickMat.color.setHex(0xff4400);
  // Música 🎵
  playBirthdayMusic();
  // Popup
  setTimeout(showPopup, 1200);
  // Confetti infinito!
  setTimeout(() => {
    launchConfetti();
    setInterval(launchConfetti, 1800);
  }, 300);
}

// ─── Reproducir música ───────────────────────────────────────────────
function playBirthdayMusic() {
  const audio = new Audio(MI_MUSICA);
  audio.volume = 1.0;
  audio.play().catch(() => {});
}

// ─── Confetti ────────────────────────────────────────────────────────
let confettiCount = 60;
const CONFETTI_MIN = 1;

function launchConfetti() {
  const colors = ['#ff6fb7', '#ffd166', '#06d6a0', '#c44dff', '#ff9a3c', '#fff'];
  const shapes = ['2px', '50%', '0'];
  for (let i = 0; i < confettiCount; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    const size = 6 + Math.random() * 8;
    c.style.cssText = `
      left: ${Math.random() * 100}vw;
      width: ${size}px;
      height: ${size * (0.4 + Math.random() * 0.8)}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      --duration: ${2 + Math.random() * 2.5}s;
      --delay: ${Math.random() * 1.5}s;
      --drift: ${(Math.random() - 0.5) * 200}px;
      --radius: ${shapes[Math.floor(Math.random() * shapes.length)]};
    `;
    document.body.appendChild(c);
    const dur = (parseFloat(c.style.getPropertyValue('--duration')) + parseFloat(c.style.getPropertyValue('--delay'))) * 1000;
    setTimeout(() => c.remove(), dur + 500);
  }
  // Reduce gradualmente hasta el mínimo y nunca para
  if (confettiCount > CONFETTI_MIN) {
    confettiCount = Math.max(CONFETTI_MIN, Math.floor(confettiCount * 0.75));
  }
  setTimeout(launchConfetti, 20000);
}

// ─── Popup ───────────────────────────────────────────────────────────
function showPopup() {
  document.getElementById('popup-overlay').classList.add('visible');
}

function closePopup(e) {
  document.getElementById('popup-overlay').classList.remove('visible');
}
</script>

<div id="popup-overlay" onclick="closePopup(event)">
  <div class="popup-card" onclick="event.stopPropagation()">
    <div class="popup-emoji">💖</div>
    <p class="popup-text" id="popup-message">Hace tantos años te conocí y ahora estamos viviendo esto juntos.</p>
    <p class="popup-hint" onclick="closePopup(event)" style="cursor:pointer;">toca para cerrar</p>
  </div>
</div>
</body>
</html>
